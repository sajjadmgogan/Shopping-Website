<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/sinin.css">
    <title>sin in</title>
</head>
<body>
    <div class="form_container">
        <h1>ثبت نام</h1>
        <form class="sinin_form" action="">
            <div>
                <label for="name">نام</label>
                <input type="text" id="name" placeholder="نام">
                <span id="namespan"></span>
            </div>
            <div>
                <label for="lastname">نام خانوادگی</label>
                <input type="text" id="lastname" placeholder="نام خانوادگی">
                <span id="lastnamespan"></span>
            </div>
            <div>
                <label for="phone_number">شماره تماس</label>
                <input type="text" id="phone_number" placeholder="*********09"> 
                <span id="phonespan"></span>
            </div>
            <div>
                <label for="email">ایمیل</label>
               <input type="text" id="email" placeholder="exampl@email.com">
               <span id="emailspan"></span>
            </div>
            <div>
                <label for="password">رمز</label>
                <input type="text" id="password" placeholder="رمز">
                <span id="passspan"></span>
            </div>
            <div>
                <label for="confirm_pass">تکرار رمز</label>
                <input type="text" id="confirm_pass" placeholder="تکراز رمز">
                <span id="conpassspan"></span>
            </div>

            <a href="#">قبلا ثبت نام کرده اید؟ورود</a>

            <input type="submit" value="ثبت نام">
        </form>
    </div>

    <script src="../static/js/sinin.js"></script>
</body>
</html>
